name: Make release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release-for-github:
    name: "Release for GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Setup JDK 17 (For Gradle Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APKs
        run: ./gradlew assembleDefaultRelease --stacktrace

      - name: Setup JDK 11 (For Legacy Signing)
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 11

      - name: Sign and Verify APKs
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          # 1. 验证 Secrets 是否存在
          if [ -z "$SIGNING_KEYSTORE" ]; then echo "❌ 错误: SIGNING_KEYSTORE 为空，请检查 GitHub Secrets 设置"; exit 1; fi
          if [ -z "$SIGNING_KEY_ALIAS" ]; then echo "❌ 错误: SIGNING_KEY_ALIAS 为空"; exit 1; fi
          
          # 2. 解码 Keystore (使用 -di 忽略可能的干扰字符)
          echo "$SIGNING_KEYSTORE" | base64 -di > release.keystore
          
          # 3. 检查文件大小
          FILESIZE=$(stat -c%s "release.keystore")
          echo "📁 Keystore decoded, size: $FILESIZE bytes"
          if [ "$FILESIZE" -lt 100 ]; then echo "❌ 错误: Keystore 文件过小，解码可能失败"; exit 1; fi

          # 4. 循环签名所有 APK
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/34.0.0"
          APK_DIR="app/build/outputs/apk/default/release"
          
          find "$APK_DIR" -name "*-unsigned.apk" -type f | while read -r apk; do
            echo "🖋️ Signing $apk..."
            aligned_apk="${apk/-unsigned/-aligned}"
            signed_apk="${apk/-unsigned/-signed}"
            
            $BUILD_TOOLS_DIR/zipalign -v 4 "$apk" "$aligned_apk"
            $BUILD_TOOLS_DIR/apksigner sign --ks release.keystore \
              --ks-key-alias "$SIGNING_KEY_ALIAS" \
              --ks-pass "pass:$SIGNING_STORE_PASSWORD" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "$signed_apk" "$aligned_apk"
            
            $BUILD_TOOLS_DIR/apksigner verify "$signed_apk"
            echo "✅ Signed: $signed_apk"
          done
          rm release.keystore

      - name: Rename and Prepare Artifacts
        run: |
          set -euo pipefail
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          echo "📦 Renaming artifacts for release..."
          find app/build/outputs/apk/default/release -name "*-signed.apk" -type f | while read -r src; do
            abi=$(basename "$src" | sed 's/app-default-//;s/-release-signed.apk//')
            dst="mpvNAS-Player-${abi}-${VERSION_TAG}.apk"
            cp "$src" "$dst"
            sha256sum "$dst" | awk '{ print $1 }' > "${dst}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mpv NAS Player ${{ github.ref_name }}
          body: |
            ### 🚀 mpv NAS Player ${{ github.ref_name }}
            
            搭载最强 **mpv v0.41.0** 内核。
          files: |
            mpvNAS-Player-*.apk
            *.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Make release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release-for-github:
    name: "Release for GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build default release with Gradle
        run: ./gradlew assembleDefaultRelease --stacktrace

      - name: Sign APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/default/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename and Prepare Artifacts
        run: |
          set -euo pipefail
          VERSION_TAG=$(basename $GITHUB_REF)
          
          # Find all signed APKs and move them to root with better names
          # The signing action places signed APKs in the same releaseDirectory
          find app/build/outputs/apk/default/release -name "*-signed.apk" -type f | while read -r src; do
            filename=$(basename "$src")
            # Extract ABI from filename like app-default-arm64-v8a-release-signed.apk
            abi=$(echo "$filename" | sed 's/app-default-//;s/-release-signed.apk//')
            dst="mpvNAS-Player-${abi}-${VERSION_TAG}.apk"
            cp "$src" "$dst"
            checksum=$(sha256sum "$dst" | awk '{ print $1 }')
            # Set environment variable for checksums in release body
            echo "apk_${abi//-/_}_sha256=$checksum" >> "$GITHUB_ENV"
          done
          
          ls -lah mpvNAS-Player-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mpv NAS Player ${{ github.ref_name }}
          body: |
            ---
            ### Checksums

            | Variant | SHA-256 |
            | ------- | ------- |
            | arm64-v8a | ${{ env.apk_arm64_v8a_sha256 }} |
            | armeabi-v7a | ${{ env.apk_armeabi_v7a_sha256 }} |
            | Universal | ${{ env.apk_universal_sha256 }} |
            | x86 | ${{ env.apk_x86_sha256 }} |
            | x86_64 | ${{ env.apk_x86_64_sha256 }} |
          files: |
            mpvNAS-Player-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build defaultDebug APK
        run: ./gradlew assembleDefaultDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: mpvex-debug
          path: app/build/outputs/apk/default/debug/*.apk

      - name: Build defaultRelease APK
        run: ./gradlew assembleDefaultRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: mpvex-release
          path: app/build/outputs/apk/default/release/*.apk
